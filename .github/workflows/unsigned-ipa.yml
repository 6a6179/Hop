name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/unsigned-ipa.yml"
      - "Frameworks/Libbox.xcframework.sha256"
      - "Hop/**"
      - "Hop.xcodeproj/**"
      - "HopTunnel/**"
      - "Shared/**"
      - "project.yml"
      - "scripts/**"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unsigned-ipa:
    name: Build unsigned IPA
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # Third-party actions are pinned to commit SHAs (tag in the comment):
      # mutable tags can be repointed. The build job has read-only contents
      # permissions and checkout does not persist credentials into .git.
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Show Xcode and SDK versions
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install build tools
        run: |
          set -euo pipefail

          if ! command -v go >/dev/null 2>&1; then
            brew install go
          fi

          go_version="$(go env GOVERSION 2>/dev/null || true)"
          go_minor="$(printf '%s' "$go_version" | sed -E 's/^go1\.([0-9]+).*/\1/')"
          if [[ -z "$go_minor" || "$go_minor" -lt 23 ]]; then
            brew install go
          fi

          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

          go version
          xcodegen --version

      - name: Cache Go build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-libbox-${{ hashFiles('scripts/build-libbox.sh') }}
          restore-keys: |
            ${{ runner.os }}-go-libbox-

      - name: Record committed libbox provenance
        run: |
          set -euo pipefail
          # Snapshot the reviewed, repo-committed engine digest BEFORE
          # build-libbox.sh rebuilds the engine and refreshes the manifest —
          # otherwise the later verify pass only compares the fresh build
          # against itself and the committed provenance never gates anything.
          cp Frameworks/Libbox.xcframework.sha256 /tmp/libbox-committed.sha256

      - name: Build pinned libbox engine
        run: scripts/build-libbox.sh

      - name: Compare engine digest against committed provenance
        run: |
          set -euo pipefail
          committed="$(awk '{print $1}' /tmp/libbox-committed.sha256)"
          rebuilt="$(awk '{print $1}' Frameworks/Libbox.xcframework.sha256)"
          {
            echo "### Libbox provenance"
            echo
            echo "- Committed manifest digest: \`${committed}\`"
            echo "- CI-rebuilt engine digest: \`${rebuilt}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "$committed" == "$rebuilt" ]]; then
            echo "- Digests match: the CI build reproduced the committed engine." >> "$GITHUB_STEP_SUMMARY"
          else
            # Not fatal: gomobile output is not bit-reproducible across
            # Xcode/Go toolchain versions, so a mismatch alone is expected.
            # The enforced supply-chain control is the pinned-commit check in
            # build-libbox.sh (the tag must resolve to SING_BOX_COMMIT before
            # any upstream code runs). This step makes the divergence visible
            # instead of silently re-recording whatever was built.
            echo "- Digests differ. Expected when the CI toolchain differs from the one that produced the committed engine; the pinned sing-box commit check in scripts/build-libbox.sh remains the integrity gate." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Libbox digest differs from committed manifest::CI rebuilt the engine from the pinned commit, but the binary digest differs from Frameworks/Libbox.xcframework.sha256 (toolchain difference or upstream build change)."
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          set -euo pipefail

          rm -rf build/UnsignedIPA
          mkdir -p build/UnsignedIPA

          xcodebuild \
            -project Hop.xcodeproj \
            -scheme Hop \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/UnsignedIPA/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP="build/UnsignedIPA/DerivedData/Build/Products/Release-iphoneos/Hop.app"
          STAGE="build/UnsignedIPA/staging"

          test -d "$APP"
          rm -rf "$STAGE" build/UnsignedIPA/Hop-unsigned.ipa
          mkdir -p "$STAGE/Payload"
          ditto "$APP" "$STAGE/Payload/Hop.app"
          find "$STAGE/Payload/Hop.app" \( -name _CodeSignature -o -name embedded.mobileprovision \) -print -exec rm -rf {} +
          xattr -cr "$STAGE/Payload/Hop.app" || true

          # Fakesign: ad-hoc signatures whose entitlements mirror the real
          # ones, so sideload signers can read each binary's required
          # capabilities and re-map them onto their own certificate. A
          # CODE_SIGNING_ALLOWED=NO build carries no entitlements blob at all,
          # which makes signers re-sign HopTunnel.appex without the Packet
          # Tunnel entitlement or App Groups — iOS then refuses to launch the
          # extension and the VPN drops from connecting to disconnected
          # immediately. The placeholder XXXXXXXXXX. team prefix is replaced
          # by the signer's real team identifier.
          sed 's/\$(AppIdentifierPrefix)/XXXXXXXXXX./' HopTunnel/HopTunnel.entitlements > "$STAGE/HopTunnel.entitlements"
          sed 's/\$(AppIdentifierPrefix)/XXXXXXXXXX./' Hop/Hop.entitlements > "$STAGE/Hop.entitlements"
          codesign --force --sign - --entitlements "$STAGE/HopTunnel.entitlements" "$STAGE/Payload/Hop.app/PlugIns/HopTunnel.appex"
          codesign --force --sign - --entitlements "$STAGE/Hop.entitlements" "$STAGE/Payload/Hop.app"

          echo "--- Hop.app entitlements ---"
          codesign -d --entitlements - "$STAGE/Payload/Hop.app"
          echo "--- HopTunnel.appex entitlements ---"
          codesign -d --entitlements - "$STAGE/Payload/Hop.app/PlugIns/HopTunnel.appex"

          (cd "$STAGE" && ditto -c -k --sequesterRsrc --keepParent Payload ../Hop-unsigned.ipa)

      - name: Summarize artifact
        run: |
          set -euo pipefail

          IPA="build/UnsignedIPA/Hop-unsigned.ipa"
          test -f "$IPA"

          size_bytes="$(stat -f '%z' "$IPA")"
          sha256="$(shasum -a 256 "$IPA" | awk '{print $1}')"
          printf '%s  %s\n' "$sha256" "Hop-unsigned.ipa" > build/UnsignedIPA/Hop-unsigned.ipa.sha256
          release_tag="unsigned-ipa-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          {
            echo "### Unsigned IPA"
            echo
            echo "- File: \`Hop-unsigned.ipa\`"
            echo "- Size: \`${size_bytes} bytes\`"
            echo "- SHA-256: \`${sha256}\`"
            echo "- Release tag: \`${release_tag}\`"
            echo
            echo "> This IPA is ad-hoc fakesigned (entitlements embedded for re-signers). It still needs proper signing/provisioning before installation on a physical device; the signer must keep the Packet Tunnel entitlement on HopTunnel.appex."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hop-unsigned.ipa
          path: build/UnsignedIPA/Hop-unsigned.ipa
          archive: false
          if-no-files-found: error
          retention-days: 14

      - name: Upload checksum artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: Hop-unsigned.ipa.sha256
          path: build/UnsignedIPA/Hop-unsigned.ipa.sha256
          archive: false
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish unsigned IPA release
    needs: unsigned-ipa
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download build artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p build/UnsignedIPA

          download_artifact() {
            name="$1"
            output="$2"
            artifact_id="$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
              --jq ".artifacts[] | select(.name == \"${name}\" and .expired == false) | .id" \
              | head -n 1)"

            if [[ -z "$artifact_id" ]]; then
              echo "::error title=Artifact not found::${name}"
              exit 1
            fi

            curl --fail --location --show-error \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              --output "$output"
            test -s "$output"
          }

          download_artifact "Hop-unsigned.ipa" "build/UnsignedIPA/Hop-unsigned.ipa"
          download_artifact "Hop-unsigned.ipa.sha256" "build/UnsignedIPA/Hop-unsigned.ipa.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          IPA="build/UnsignedIPA/Hop-unsigned.ipa"
          CHECKSUM="build/UnsignedIPA/Hop-unsigned.ipa.sha256"
          test -f "$IPA"
          test -f "$CHECKSUM"

          size_bytes="$(stat -c '%s' "$IPA")"
          sha256="$(awk '{print $1}' "$CHECKSUM")"
          release_tag="unsigned-ipa-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          release_name="Hop unsigned IPA ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          release_notes="build/UnsignedIPA/release-notes.md"

          cat > "$release_notes" <<EOF
          Unsigned IPA built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}.

          - Branch/ref: ${GITHUB_REF_NAME}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Size: ${size_bytes} bytes
          - SHA-256: ${sha256}

          This IPA is ad-hoc fakesigned: each binary carries its required entitlements (Packet Tunnel, App Groups, Keychain) with a placeholder XXXXXXXXXX. team prefix so sideload signers can re-map them. It still needs proper signing/provisioning before installation on a physical device. When re-signing, make sure your tool signs the embedded HopTunnel.appex with the Packet Tunnel entitlement — without it iOS kills the VPN extension at launch.
          EOF

          gh release create "$release_tag" \
            "$IPA#Hop-unsigned.ipa" \
            "$CHECKSUM#Hop-unsigned.ipa.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes-file "$release_notes" \
            --prerelease \
            --latest=false

          release_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${release_tag}"
          echo "- Release: ${release_url}" >> "$GITHUB_STEP_SUMMARY"
