name: Hop
options:
  bundleIdPrefix: cat.string
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.2"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: ""
  configs:
    Release:
      # Coverage counters and the profiling runtime add work to packet and UI
      # hot paths. Tests can still opt into coverage in Debug builds.
      ENABLE_CODE_COVERAGE: NO
targets:
  Hop:
    type: application
    platform: iOS
    sources:
      - path: Hop
        excludes:
          # Kept in source control for bridge/schema review tooling; the app
          # never reads this build-time manifest at runtime.
          - Resources/xray-client-schema-v26.6.27.json
      - Shared
      - path: Geodata/geoip.dat
        buildPhase: resources
      - path: Geodata/geosite.dat
        buildPhase: resources
    dependencies:
      - target: HopTunnel
        embed: true
      # The app links the same pinned core for exact preflight validation. It
      # never starts an Xray instance; the packet-tunnel extension owns runtime.
      - framework: Frameworks/LibXray.xcframework
        embed: false
      - sdk: libresolv.tbd
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cat.string.hop
        INFOPLIST_FILE: Hop/Info.plist
        CODE_SIGN_ENTITLEMENTS: Hop/Hop.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  HopTunnel:
    type: app-extension
    platform: iOS
    sources:
      - HopTunnel
      - Shared
      - path: Geodata/geoip.dat
        buildPhase: resources
      - path: Geodata/geosite.dat
        buildPhase: resources
    preBuildScripts:
      # Fail if the privileged static engine differs from the reviewed build.
      - name: Verify LibXray provenance
        script: '"$SRCROOT/scripts/verify-libxray.sh"'
        basedOnDependencyAnalysis: false
      - name: Verify local geodata
        script: '"$SRCROOT/scripts/verify-geodata.sh"'
        basedOnDependencyAnalysis: false
    dependencies:
      # Build this first: scripts/build-libxray.sh (needs pinned Go). gomobile emits a
      # *static* framework, so it's linked into the .appex, not embedded.
      - framework: Frameworks/LibXray.xcframework
        embed: false
      # System libraries referenced by the static Go engine and bindings.
      - sdk: libresolv.tbd
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cat.string.hop.tunnel
        INFOPLIST_FILE: HopTunnel/Info.plist
        CODE_SIGN_ENTITLEMENTS: HopTunnel/HopTunnel.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        # Keep the gomobile boundary to versioned JSON strings so no Go-owned
        # reference type crosses Swift concurrency domains.
        SWIFT_VERSION: "6.2"
  HopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HopTests
    dependencies:
      - target: Hop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cat.string.hop.tests
        GENERATE_INFOPLIST_FILE: YES
